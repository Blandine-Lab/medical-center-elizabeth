<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offres d'emploi - MCE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f7fa; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #0b6e8f; margin-bottom: 20px; }
        .recrutement-img {
            width: 100%;
            max-width: 1000px;
            display: block;
            margin: 0 auto 30px auto;
            border-radius: 16px;
        }
        .job-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .job-card h3 { color: #0b6e8f; margin-bottom: 10px; }
        .meta { margin: 10px 0; color: #666; font-size: 0.9rem; display: flex; gap: 20px; flex-wrap: wrap; }
        .badge { background: #e0f2fe; padding: 4px 10px; border-radius: 20px; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn-details {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-apply {
            background: #0b6e8f;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        .btn-details:hover { background: #1e2a36; }
        .btn-apply:hover { background: #065a74; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            padding: 20px;
            border-radius: 12px;
        }
        .close { float: right; cursor: pointer; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        .feedback { margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <!-- Image "Nous recrutons" sans transparence -->
    <img src="/uploads/recrutons.jpg" alt="Nous recrutons" class="recrutement-img" onerror="this.style.display='none'">

    <h1>📢 Offres d'emploi</h1>
    <div id="jobsList">Chargement...</div>
</div>

<!-- Modal de candidature -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3 id="modalTitle">Postuler</h3>
        <form id="applyForm">
            <input type="hidden" id="jobId">
            <input type="hidden" id="jobTitle">
            <div class="form-group">
                <label>Nom complet *</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" id="phone">
            </div>
            <div class="form-group">
                <label>CV (PDF, max 5 Mo) *</label>
                <input type="file" id="cv" accept=".pdf" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="3"></textarea>
            </div>
            <button type="submit">Envoyer ma candidature</button>
            <div class="feedback" id="feedback"></div>
        </form>
    </div>
</div>

<script>
    // ========== CONFIGURATION API ==========
    const API_BASE = 'https://mce-backend-fgpg.onrender.com/api';
    
    const modal = document.getElementById('modal');
    const closeBtn = document.querySelector('.close');
    const feedbackDiv = document.getElementById('feedback');

    function showModal(job) {
        document.getElementById('jobId').value = job.id;
        document.getElementById('jobTitle').value = job.title;
        document.getElementById('modalTitle').innerText = `Postuler : ${job.title}`;
        document.getElementById('fullName').value = '';
        document.getElementById('email').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('message').value = '';
        document.getElementById('cv').value = '';
        feedbackDiv.innerHTML = '';
        modal.style.display = 'flex';
    }

    closeBtn.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    async function loadJobs() {
        try {
            const res = await fetch(`${API_BASE}/jobs`);
            if (!res.ok) throw new Error('Erreur réseau');
            const jobs = await res.json();
            const container = document.getElementById('jobsList');
            if (!jobs.length) {
                container.innerHTML = '<p>Aucune offre pour le moment.</p>';
                return;
            }
            container.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <h3>${escapeHtml(job.title)}</h3>
                    <div class="meta">
                        <span>🏢 ${escapeHtml(job.department)}</span>
                        <span>📄 <span class="badge">${escapeHtml(job.contract_type)}</span></span>
                        <span>📍 ${escapeHtml(job.location)}</span>
                    </div>
                    <p>${escapeHtml(job.description)}</p>
                    <p><strong>Prérequis :</strong> ${escapeHtml(job.requirements)}</p>
                    <div class="btn-group">
                        <a href="job-details.html?id=${job.id}" class="btn-details">🔍 Voir les détails</a>
                        <button class="btn-apply" onclick='showModal(${JSON.stringify(job)})'>📩 Postuler</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            document.getElementById('jobsList').innerHTML = '<p style="color:red;">Erreur de chargement.</p>';
            console.error(err);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    document.getElementById('applyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const jobId = document.getElementById('jobId').value;
        const jobTitle = document.getElementById('jobTitle').value;
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const message = document.getElementById('message').value;
        const cvFile = document.getElementById('cv').files[0];

        if (!fullName || !email) {
            feedbackDiv.innerHTML = '<span style="color:red;">Veuillez remplir nom et email.</span>';
            return;
        }
        if (!cvFile) {
            feedbackDiv.innerHTML = '<span style="color:red;">Veuillez joindre votre CV.</span>';
            return;
        }
        if (cvFile.size > 5 * 1024 * 1024) {
            feedbackDiv.innerHTML = '<span style="color:red;">CV trop volumineux (max 5 Mo).</span>';
            return;
        }

        feedbackDiv.innerHTML = '<span style="color:blue;">Envoi en cours...</span>';
        const submitBtn = e.target.querySelector('button');
        submitBtn.disabled = true;

        try {
            // Upload CV
            const formData = new FormData();
            formData.append('cv', cvFile);
            const uploadRes = await fetch(`${API_BASE}/upload/cv`, { method: 'POST', body: formData });
            const uploadData = await uploadRes.json();
            if (!uploadRes.ok) throw new Error(uploadData.error || 'Upload échoué');

            // Envoi candidature
            const appRes = await fetch(`${API_BASE}/applications`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jobId: parseInt(jobId),
                    jobTitle: jobTitle,
                    fullName: fullName,
                    email: email,
                    phone: phone,
                    message: message,
                    cvUrl: uploadData.cvUrl
                })
            });
            const appData = await appRes.json();
            if (appRes.ok) {
                feedbackDiv.innerHTML = '<span style="color:green;">✅ Candidature envoyée !</span>';
                setTimeout(() => modal.style.display = 'none', 2000);
            } else {
                throw new Error(appData.error || 'Erreur envoi');
            }
        } catch (err) {
            feedbackDiv.innerHTML = `<span style="color:red;">❌ ${err.message}</span>`;
        } finally {
            submitBtn.disabled = false;
        }
    });

    loadJobs();
</script>
</body>
</html>
