<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - MCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0b6e8f 0%, #2ec4b6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 2rem; border-radius: 1rem; width: 350px; text-align: center; }
        input { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 0.5rem; }
        button { background: #0b6e8f; color: white; border: none; padding: 0.8rem; width: 100%; border-radius: 2rem; cursor: pointer; }
        .error { color: red; margin-top: 1rem; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Administration MCE</h2>
    <input type="text" id="username" placeholder="Identifiant">
    <input type="password" id="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <div id="error" class="error"></div>
</div>
<script>
    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        // Authentification simple (à sécuriser)
        if (username === 'admin' && password === 'nexus2026') {
            localStorage.setItem('adminToken', 'admin-token');
            window.location.href = '/admin-dashboard.html';
        } else {
            document.getElementById('error').innerText = 'Identifiants incorrects';
        }
    }
</script>
</body>
</html>
