<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Medical Center Elizabeth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0b6e8f 0%, #2ec4b6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; border-radius: 2rem; padding: 2.5rem; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { color: #0b6e8f; font-size: 1.8rem; }
        .logo p { color: #666; font-size: 0.9rem; }
        .tab-buttons { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; background: none; border: none; padding: 1rem; font-size: 1rem; cursor: pointer; transition: all 0.3s; font-weight: 600; color: #666; }
        .tab-btn.active { color: #0b6e8f; border-bottom: 2px solid #0b6e8f; margin-bottom: -2px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333; }
        .form-group input { width: 100%; padding: 0.9rem; border: 1px solid #ddd; border-radius: 0.8rem; font-size: 1rem; transition: border 0.3s; }
        .form-group input:focus { outline: none; border-color: #0b6e8f; }
        .btn-login { width: 100%; background: linear-gradient(135deg, #0b6e8f 0%, #2ec4b6 100%); color: white; border: none; padding: 1rem; border-radius: 2rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.3s; }
        .btn-login:hover { transform: translateY(-2px); }
        .error-msg { background: #ffebee; color: #c62828; padding: 0.8rem; border-radius: 0.8rem; margin-bottom: 1rem; text-align: center; display: none; }
        .info-text { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: #999; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1><i class="fas fa-heartbeat"></i> Medical Center Elizabeth</h1>
        <p>Espace sécurisé - Connexion</p>
    </div>
    
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="showTab('patient')">👤 Patient</button>
        <button class="tab-btn" onclick="showTab('staff')">👨‍⚕️ Personnel</button>
    </div>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <!-- Formulaire Patient -->
    <div id="patientPanel" class="form-panel active">
        <form id="patientLoginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="patientEmail" required placeholder="sophie.martin@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="patientPassword" required placeholder="patient123">
            </div>
            <button type="submit" class="btn-login">Se connecter (Patient)</button>
        </form>
        <div class="info-text">
            <strong>Test :</strong> sophie.martin@email.com / patient123
        </div>
    </div>
    
    <!-- Formulaire Staff -->
    <div id="staffPanel" class="form-panel">
        <form id="staffLoginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="staffEmail" required placeholder="jean.dupont@mce.fr">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="staffPassword" required placeholder="doctor123">
            </div>
            <button type="submit" class="btn-login">Se connecter (Personnel)</button>
        </form>
        <div class="info-text">
            <strong>Test Médecin :</strong> jean.dupont@mce.fr / doctor123<br>
            <strong>Test Infirmier :</strong> isabelle.leroy@mce.fr / nurse123
        </div>
    </div>
</div>

<script>
    function showTab(type) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('patientPanel').classList.remove('active');
        document.getElementById('staffPanel').classList.remove('active');
        
        if (type === 'patient') {
            document.getElementById('patientPanel').classList.add('active');
        } else {
            document.getElementById('staffPanel').classList.add('active');
        }
    }
    
    function showError(message) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 3000);
    }
    
    // Login Patient
    document.getElementById('patientLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('patientEmail').value;
        const password = document.getElementById('patientPassword').value;
        
        try {
            const res = await fetch('/api/auth/patient/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/patient-dashboard.html';
            } else {
                showError(data.error || 'Erreur de connexion');
            }
        } catch(err) {
            showError('Erreur de connexion au serveur');
        }
    });
    
    // Login Staff
    document.getElementById('staffLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('staffEmail').value;
        const password = document.getElementById('staffPassword').value;
        
        try {
            const res = await fetch('/api/auth/staff/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/staff-dashboard.html';
            } else {
                showError(data.error || 'Erreur de connexion');
            }
        } catch(err) {
            showError('Erreur de connexion au serveur');
        }
    });
</script>
</body>
</html>
