<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion / Inscription - Espace Patient | MCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0b6e8f, #2ec4b6); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-container { background: white; border-radius: 2rem; max-width: 500px; width: 100%; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #eee; }
        .tab { padding: 0.5rem 1rem; cursor: pointer; font-weight: 600; color: #666; transition: 0.2s; }
        .tab.active { color: #0b6e8f; border-bottom: 2px solid #0b6e8f; margin-bottom: -2px; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #0b6e8f; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 0.8rem; font-family: inherit; }
        button { background: #0b6e8f; color: white; border: none; padding: 0.8rem; border-radius: 2rem; width: 100%; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #07506b; }
        .error { color: #dc3545; font-size: 0.85rem; margin-top: 0.5rem; text-align: center; }
        .success { color: #28a745; text-align: center; margin-top: 0.5rem; }
        .footer-text { text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: #666; }
        .footer-text a { color: #0b6e8f; text-decoration: none; }
    </style>
</head>
<body>
<div class="login-container">
    <h2 style="text-align: center; margin-bottom: 1rem;">👤 Espace Patient</h2>
    <div class="tabs">
        <div class="tab active" data-tab="login">Connexion</div>
        <div class="tab" data-tab="register">Inscription</div>
    </div>

    <!-- Formulaire de connexion -->
    <div id="loginPanel" class="form-panel active">
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit">Se connecter</button>
            <div id="loginError" class="error"></div>
        </form>
    </div>

    <!-- Formulaire d'inscription -->
    <div id="registerPanel" class="form-panel">
        <form id="registerForm">
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" id="regFirstname" required>
            </div>
            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="regLastname" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label>Téléphone (optionnel)</label>
                <input type="tel" id="regPhone">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="regPassword" required>
            </div>
            <div class="form-group">
                <label>Confirmation</label>
                <input type="password" id="regConfirm" required>
            </div>
            <button type="submit">Créer mon compte</button>
            <div id="registerError" class="error"></div>
            <div id="registerSuccess" class="success"></div>
        </form>
    </div>
    <div class="footer-text">
        <a href="index.html">← Retour à l'accueil</a>
    </div>
</div>

<script>
    const API_URL = '/api';

    // Onglets
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('loginPanel').classList.toggle('active', target === 'login');
            document.getElementById('registerPanel').classList.toggle('active', target === 'register');
            // Réinitialiser les messages
            document.getElementById('loginError').innerText = '';
            document.getElementById('registerError').innerText = '';
            document.getElementById('registerSuccess').innerText = '';
        });
    });

    // Connexion
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        errorDiv.innerText = '';

        try {
            const res = await fetch(`${API_URL}/patient/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok && data.success) {
                localStorage.setItem('patientToken', data.token);
                localStorage.setItem('patientInfo', JSON.stringify(data.patient));
                window.location.href = 'patient-messages.html';
            } else {
                errorDiv.innerText = data.error || 'Identifiants incorrects';
            }
        } catch(err) {
            errorDiv.innerText = 'Erreur réseau';
        }
    });

    // Inscription
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const first_name = document.getElementById('regFirstname').value;
        const last_name = document.getElementById('regLastname').value;
        const email = document.getElementById('regEmail').value;
        const phone = document.getElementById('regPhone').value;
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        const errorDiv = document.getElementById('registerError');
        const successDiv = document.getElementById('registerSuccess');
        errorDiv.innerText = '';
        successDiv.innerText = '';

        if (password !== confirm) {
            errorDiv.innerText = 'Les mots de passe ne correspondent pas';
            return;
        }
        if (password.length < 4) {
            errorDiv.innerText = 'Le mot de passe doit contenir au moins 4 caractères';
            return;
        }

        try {
            const res = await fetch(`${API_URL}/patient/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ first_name, last_name, email, password, phone })
            });
            const data = await res.json();
            if (res.ok && data.success) {
                successDiv.innerText = 'Inscription réussie ! Vous pouvez maintenant vous connecter.';
                // Réinitialiser le formulaire
                document.getElementById('registerForm').reset();
                // Basculer vers l'onglet connexion après 2 secondes
                setTimeout(() => {
                    document.querySelector('.tab[data-tab="login"]').click();
                }, 2000);
            } else {
                errorDiv.innerText = data.error || 'Erreur lors de l\'inscription';
            }
        } catch(err) {
            errorDiv.innerText = 'Erreur réseau';
        }
    });
</script>
</body>
</html>
