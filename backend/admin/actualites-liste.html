<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des actualités – Administration MCE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7fc; margin: 0; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { color: #0b6e8f; margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #0b6e8f; color: white; }
        .btn { background: #0b6e8f; color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 0.5rem; display: inline-block; margin-right: 0.5rem; border: none; cursor: pointer; font-size: 0.9rem; }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-add { background: #28a745; margin-bottom: 1rem; display: inline-block; }
        .btn-delete { background: #dc3545; }
        img { max-width: 80px; max-height: 50px; object-fit: cover; border-radius: 4px; }
        .actions { white-space: nowrap; }
        .alert { padding: 0.75rem; margin-bottom: 1rem; border-radius: 0.5rem; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container">
    <h1>📰 Gestion des actualités</h1>
    <a href="actualites-edit.html?id=new" class="btn btn-add">➕ Ajouter une actualité</a>
    <div id="messageDiv"></div>
    <table>
        <thead>
            <tr><th>ID</th><th>Titre</th><th>Image</th><th>Ordre</th><th>Actif</th><th>Actions</th></tr>
        </thead>
        <tbody id="actuTable">
            <tr><td colspan="6">Chargement...</td></tr>
        </tbody>
    </table>
</div>
<script>
    async function loadActualites() {
        const res = await fetch('/api/actualites');
        const data = await res.json();
        const tbody = document.getElementById('actuTable');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="6">Aucune actualité</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(actu => `
            <tr>
                <td>${actu.id}</td>
                <td>${escapeHtml(actu.titre)}</td>
                <td>${actu.image_url ? `<img src="${actu.image_url}" onerror="this.style.display='none'">` : '-'}</td>
                <td>${actu.ordre}</td>
                <td>${actu.active ? '✅ Oui' : '❌ Non'}</td>
                <td class="actions">
                    <a href="actualites-edit.html?id=${actu.id}" class="btn btn-edit">✏️ Modifier</a>
                    <button onclick="supprimer(${actu.id})" class="btn btn-delete">🗑️ Supprimer</button>
                </td>
            </tr>
        `).join('');
    }

    async function supprimer(id) {
        if (!confirm('Supprimer définitivement cette actualité ?')) return;
        const res = await fetch(`/api/actualites/${id}`, { method: 'DELETE' });
        if (res.ok) {
            document.getElementById('messageDiv').innerHTML = '<div class="alert alert-success">Actualité supprimée.</div>';
            loadActualites();
            setTimeout(() => document.getElementById('messageDiv').innerHTML = '', 3000);
        } else {
            const err = await res.json();
            document.getElementById('messageDiv').innerHTML = `<div class="alert alert-error">Erreur : ${err.error}</div>`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    loadActualites();
</script>
</body>
</html>
